replicaCount: 1

image:
  repository: bosgenesis-mop-creation-agent
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

proxy:
  noProxy: "localhost,127.0.0.1,.svc,.svc.cluster.local,bosgenesis-k8s-inspector-mcp,bosgenesis-helm-manager-mcp,bosgenesis-k8s-data-ingestion-agent"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: mop-creation-agent.bosgenesis.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

config:
  agent:
    name: bosgenesis-mop-creation-agent
    mode: on_demand
    source_namespace: bosgenesis
    local_storage_enabled: true
    local_storage_path: /data/mops
    default_generation_mode: platform-only
    public_repositories_only: true
  api:
    host: 0.0.0.0
    port: 8080
  logging:
    level: INFO
    format: json
  mcp:
    k8s_inspector:
      enabled: true
      endpoint: http://bosgenesis-k8s-inspector-mcp.bosgenesis.svc.cluster.local:8080/mcp
      host_header: k8s-inspector.bosgenesis.local
      detail_enrichment_kinds:
        - ConfigMap
        - Service
        - Deployment
        - StatefulSet
        - DaemonSet
        - Job
        - CronJob
        - PersistentVolumeClaim
        - Ingress
    helm_manager:
      enabled: true
      endpoint: http://bosgenesis-helm-manager-mcp.bosgenesis.svc.cluster.local:8080/mcp
      host_header: helm-manager.bosgenesis.local
    data_ingestion_agent:
      enabled: true
      endpoint: http://bosgenesis-k8s-data-ingestion-agent.bosgenesis.svc.cluster.local:8080/mcp
      host_header: data-ingestion-agent.bosgenesis.local
  retrieval:
    qdrant:
      enabled: true
      mode: read_only
      endpoint: http://qdrant.bosgenesis.svc.cluster.local:6333
      collection: mop_installation_notes
      top_k: 5
      min_score: 0.72
      ingestion_owned_by: separate-agent
      timeout_seconds: 5
      exact_match_bonus: 0.4
      ingestion_api_enabled: true
      ingestion_vector_size: 384
      max_ingestion_artifact_bytes: 262144
  features:
    artifact_preview:
      enabled: true
      max_bytes: 262144
      allowed_extensions:
        - .json
        - .md
        - .yaml
        - .yml
      download_extensions:
        - .json
        - .md
        - .yaml
        - .yml
        - .pdf
  inventory:
    postgres:
      enabled: true
      schema_name: k8s_ingestion
    clickhouse:
      enabled: true
      host: clickhouse.bosgenesis.svc.cluster.local
      port: 8123
      user: bosgenesis
      database: bosgenesis_k8s_ingestion
  observability:
    langfuse_enabled: true
    signoz_enabled: true
    otlp_endpoint: http://signoz-otel-collector.signoz:4317
  memory:
    enabled: true
    langmem_enabled: true
    short_term_enabled: true
    episodic_enabled: true
    knowledge_enabled: true
    max_context_items: 5
    max_summary_chars: 800
    redis:
      enabled: true
      endpoint: redis-master.bosgenesis.svc.cluster.local:6379
      db: 0
      key_prefix: mop-agent-memory
    pgvector:
      enabled: true
      dsn: ""
      table: mop_agent_memory
    qdrant:
      enabled: false
      endpoint: http://qdrant.bosgenesis.svc.cluster.local:6333
      collection: mop_agent_memory
    letta:
      enabled: false
  llm:
    standalone_enabled: true
    framework: langgraph-langchain
    default_model: gemma4:26b
    reasoning_enabled: true
    repair_suggestions_enabled: true
    provider: ollama
    azure_endpoint: ""
    azure_deployment: ""
    azure_api_version: 2024-12-01-preview
    temperature: 0.2
    max_tokens: 800
    minimum_confidence: 0.85
    model_profiles:
      gemma4:26b:
        provider: ollama
        model: gemma4:26b
        base_url: http://ollama.bosgenesis.svc.cluster.local:11434
        max_tokens: 2048
      gpt-4.1-mini:
        provider: azure_openai
        azure_deployment: bos-trainium-sigma-gpt-4.1-mini
        azure_api_version: 2024-12-01-preview
      gpt-5:
        provider: azure_openai
        azure_deployment: gpt-5
        azure_api_version: 2024-12-01-preview
      gemma4:
        provider: ollama
        model: gemma4:26b
        base_url: http://ollama.bosgenesis.svc.cluster.local:11434
        max_tokens: 2048
      llama70b:
        provider: ollama
        model: llama3.3:70b
        base_url: http://ollama-llama70b.bosgenesis.svc.cluster.local:11434

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""

inventoryConfig:
  postgresEnabled: "true"
  postgresSchema: "k8s_ingestion"
  clickhouseEnabled: "true"
  clickhouseHost: "clickhouse.bosgenesis.svc.cluster.local"
  clickhousePort: "8123"
  clickhouseUser: "bosgenesis"
  clickhouseDatabase: "bosgenesis_k8s_ingestion"

secret:
  create: false
  name: bosgenesis-mop-creation-agent-secret
  postgresDsn: ""
  memoryPgvectorDsn: ""
  clickhousePassword: ""

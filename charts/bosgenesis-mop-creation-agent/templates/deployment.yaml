apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bosgenesis-mop-creation-agent.fullname" . }}
  labels:
    {{- include "bosgenesis-mop-creation-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bosgenesis-mop-creation-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bosgenesis-mop-creation-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "bosgenesis-mop-creation-agent.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: BOSGENESIS_MOP_CONFIG_PATH
              value: /app/config/settings.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: mops
              mountPath: /data/mops
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "bosgenesis-mop-creation-agent.fullname" . }}-config
        - name: mops
          persistentVolumeClaim:
            claimName: {{ include "bosgenesis-mop-creation-agent.fullname" . }}-mops
        - name: tmp
          emptyDir: {}


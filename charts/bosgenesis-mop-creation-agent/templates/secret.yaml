{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "bosgenesis-mop-creation-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.secret.postgresDsn | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.secret.clickhousePassword | quote }}
{{- end }}
